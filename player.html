<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cristie - Digital Player</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="artist2.png">
    
    <style>
        :root {
            --accent: #3498db;
            --glass: rgba(255, 255, 255, 0.95);
            --text: #2c3e50;
            --subtext: #7f8c8d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Georgia', serif;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        /* Главный контейнер */
        .player-app {
            width: 100%;
            max-width: 1000px;
            height: 800px; 
            max-height: 90vh;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            display: grid;
            grid-template-columns: 1fr 380px;
            overflow: hidden;
        }

        /* --- ПЛЕЕР --- */
        .player-main {
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid rgba(0,0,0,0.1);
            background: white;
        }

        .cover-art {
            width: 320px;
            height: 320px;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .track-info { text-align: center; width: 100%; }
        .track-info h1 { font-size: 1.8em; margin-bottom: 5px; color: var(--text); }
        .track-info p { color: var(--subtext); font-style: italic; margin-bottom: 25px; }

        .controls {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 30px;
        }

        .btn {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            cursor: pointer;
            font-size: 32px;
            color: var(--text) !important; /* Принудительно черный/темный цвет */
            transition: transform 0.2s, opacity 0.2s;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-appearance: none;
            appearance: none;
        }
        .btn:active { transform: scale(0.9); }
        .play-btn { font-size: 60px; line-height: 1; }
        
        .progress-area { width: 100%; max-width: 450px; }
        input[type="range"] {
            width: 100%;
            height: 6px;
            accent-color: var(--accent);
            cursor: pointer;
            margin-bottom: 8px;
        }

        /* --- БИБЛИОТЕКА --- */
        .library {
            background: rgba(0, 0, 0, 0.02);
            padding: 25px;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .lib-nav {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 12px;
            flex-shrink: 0;
        }

        .nav-item {
            font-weight: bold;
            cursor: pointer;
            color: var(--subtext);
            transition: 0.3s;
            font-size: 1em;
            padding-bottom: 5px;
        }
        .nav-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .track-list { 
            list-style: none; 
            overflow-y: auto; 
            flex-grow: 1; 
            padding-right: 5px;
        }

        .track-list::-webkit-scrollbar { width: 5px; }
        .track-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        .track-item {
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.2s;
            background: rgba(255,255,255,0.3);
        }
        .track-item:hover, .track-item.active { background: white; color: var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .track-item img { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; }

        .album-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: white;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .album-card:hover { transform: translateX(5px); }
        .album-card img { width: 65px; height: 65px; border-radius: 8px; object-fit: cover; }
        .section-label { font-size: 0.8em; text-transform: uppercase; color: var(--subtext); margin: 20px 0 10px; font-weight: bold; display: block; }

        @media (max-width: 768px) {
            .player-app { grid-template-columns: 1fr; height: auto; max-height: none; }
            .player-main { border-right: none; border-bottom: 1px solid rgba(0,0,0,0.1); padding: 30px 20px; }
            .library { height: 500px; }
            .cover-art { width: 240px; height: 240px; }
        }
    </style>
</head>
<body>

    <div class="player-app">
        <main class="player-main">
            <img src="artist2.png" id="cover" class="cover-art" alt="Cover">
            <div class="track-info">
                <h1 id="title">Загрузка...</h1>
                <p id="artist">Cristie_music</p>
            </div>
            
            <div class="controls">
                <button class="btn" onclick="prevTrack()">⏮&#xFE0E;</button>
                <button class="btn play-btn" id="playPause" onclick="togglePlay()">▶&#xFE0E;</button>
                <button class="btn" onclick="nextTrack()">⏭&#xFE0E;</button>
                <button class="btn" id="repeatBtn" onclick="toggleRepeat()">🔁&#xFE0E;</button>
            </div>

            <div class="progress-area">
                <input type="range" id="progress" value="0" min="0" step="1">
                <div class="time-stamps" style="display: flex; justify-content: space-between; font-size: 12px; opacity: 0.7;">
                    <span id="current">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
        </main>

        <aside class="library">
            <nav class="lib-nav">
                <span class="nav-item active" id="btn-tracks" onclick="showView('tracks')">Мои треки</span>
                <span class="nav-item" id="btn-albums" onclick="showView('albums')">Альбомы</span>
            </nav>
            <div class="track-list" id="content-area"></div>
        </aside>
    </div>

    <audio id="audio"></audio>

    <script>
        const musicConfig = [
            { title: "Twins", artist: "Cristie_music", file: "songs3/1-Twins.wav", cover: "scary-tales.jpeg", album: "Страшные сказки" },
            { title: "Тихий лес", artist: "Cristie_music", file: "songs3/2-les.wav", cover: "scary-tales.jpeg", album: "Страшные сказки" },
            { title: "Страшные сказки", artist: "Cristie_music", file: "songs3/3-tales.wav", cover: "scary-tales.jpeg", album: "Страшные сказки" },
            { title: "Театр", artist: "Cristie_music", file: "songs3/4-theatr.wav", cover: "scary-tales.jpeg", album: "Страшные сказки" },
            { title: "Пороки", artist: "Cristie_music", file: "songs3/5.poroki.wav", cover: "scary-tales.jpeg", album: "Страшные сказки" },
            { title: "Russian Samurai", artist: "Cristie_music", file: "songs2/samurai.wav", cover: "samurai.png", album: null },
            { title: "Подземная любовь", artist: "Cristie_music", file: "songs/metro.wav", cover: "metro-cover-3.png", album: null },
            { title: "Crawl Away", artist: "Cristie_music", file: "songs2/crawl.wav", cover: "crawl-away-cover.png", album: null },
            { title: "Sad Demon", artist: "Cristie_music", file: "songs/1Sad_Demon.mp3", cover: "song1.jpg", album: "В АД и без меня" },
            { title: "Маска Фантазма", artist: "Cristie_music", file: "songs/2Phantasm.mp3", cover: "song2.jpg", album: "В АД и без меня" },
            { title: "Пеннивайз", artist: "Cristie_music", file: "songs/3Pennywise.mp3", cover: "song3.jpg", album: "В АД и без меня" },
            { title: "Спокойной ночи трупики!", artist: "Cristie_music", file: "songs/4good_night.mp3", cover: "song4.jpg", album: "В АД и без меня" },
            { title: "Круги (Circles)", artist: "Cristie_music", file: "songs/5Circles.mp3", cover: "song5.jpg", album: "В АД и без меня" },
            { title: "Тень", artist: "Cristie_music", file: "songs/6shadow.mp3", cover: "song6.jpg", album: "В АД и без меня" },
            { title: "Demon inside", artist: "Cristie_music", file: "songs/7Demon_inside.mp3", cover: "song7.jpg", album: "В АД и без меня" },
            { title: "Балтика Play Квин", artist: "Cristie_music", file: "songs/8play_queen.mp3", cover: "song8.jpg", album: "В АД и без меня" },
            { title: "Careless", artist: "Cristie_music", file: "songs/9Careless_EDM.mp3", cover: "song9.jpg", album: "В АД и без меня" },
            { title: "Эйфория", artist: "Cristie_music", file: "songs/10Love_Euphoria.mp3", cover: "song10.jpg", album: "В АД и без меня" },
            { title: "Sad demon (alt.)", artist: "Cristie_music", file: "songs/11Sad_demon_Alternative.mp3", cover: "song11.jpg", album: "В АД и без меня" },
            { title: "Careless (alt.)", artist: "Cristie_music", file: "songs/12Сareless.mp3", cover: "song12.jpg", album: "В АД и без меня" },
            { title: "Elements (Cover)", artist: "Cristie_music", file: "songs/13Elements_Riverline.mp3", cover: "song13.jpg", album: "В АД и без меня" },
            { title: "Numb (Cover)", artist: "Cristie_music", file: "songs/14Numb_Linkin_park.mp3", cover: "song14.jpg", album: "В АД и без меня" },
            { title: "Parasite (Cover)", artist: "Cristie_music", file: "songs/15Parasite_Banshee.mp3", cover: "song15.jpg", album: "В АД и без меня" },
            { title: "Crash (Cover)", artist: "Cristie_music", file: "songs/16Crash_DeathbyRomy.mp3", cover: "song16.jpg", album: "В АД и без меня" },
            { title: "Коллекционер (Cover)", artist: "Cristie_music", file: "songs/17Collector.mp3", cover: "song17.jpg", album: "В АД и без меня" },
            { title: "Careless", artist: "Cristie_music", file: "songs4/1Careless.wav", cover: "glubina.jpg", album: "Глубина" },
            { title: "Sad demon (alt. v2)", artist: "Cristie_music", file: "songs4/2Saddemonver-2.wav", cover: "glubina.jpg", album: "Глубина" },
            { title: "В Другой Жизни", artist: "Cristie_music", file: "songs4/3InAnotherLife.wav", cover: "glubina.jpg", album: "Глубина" },
            { title: "Не отпущу", artist: "Cristie_music", file: "songs4/4Не-отпущу.wav", cover: "glubina.jpg", album: "Глубина" },
            { title: "Туман и крылья", artist: "Cristie_music", file: "songs4/5Туман-и-крылья.wav", cover: "glubina.jpg", album: "Глубина" }
        ];

        let currentIdx = 0;
        let isRepeat = false;
        let currentView = 'tracks'; 
        let currentOpenAlbum = null; 

        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playPause');
        const contentArea = document.getElementById('content-area');

        function getLibraryData() {
            const albums = {};
            const singles = [];
            musicConfig.forEach((track, index) => {
                if (track.album) {
                    if (!albums[track.album]) albums[track.album] = { name: track.album, cover: track.cover, tracks: [] };
                    albums[track.album].tracks.push({ ...track, index });
                } else {
                    singles.push({ ...track, index });
                }
            });
            return { albums: Object.values(albums), singles };
        }

        function renderAllTracks() {
            currentOpenAlbum = null;
            contentArea.innerHTML = '';
            musicConfig.forEach((track, index) => {
                const li = document.createElement('div');
                li.className = `track-item ${currentIdx === index ? 'active' : ''}`;
                li.innerHTML = `<img src="${track.cover}"> <div><strong>${track.title}</strong><br><small>${track.album || 'Single'}</small></div>`;
                li.onclick = () => loadTrack(index);
                contentArea.appendChild(li);
            });
        }

        function renderAlbums() {
            currentOpenAlbum = null;
            contentArea.innerHTML = '';
            const { albums, singles } = getLibraryData();

            const albumHeader = document.createElement('span');
            albumHeader.className = 'section-label';
            albumHeader.innerText = 'Альбомы';
            contentArea.appendChild(albumHeader);

            albums.forEach(album => {
                const div = document.createElement('div');
                div.className = 'album-card';
                div.innerHTML = `<img src="${album.cover}"> <div class="album-info"><strong>${album.name}</strong><br><small>${album.tracks.length} трека</small></div>`;
                div.onclick = (e) => { e.stopPropagation(); renderAlbumTracks(album); };
                contentArea.appendChild(div);
            });

            if (singles.length > 0) {
                const singleHeader = document.createElement('span');
                singleHeader.className = 'section-label';
                singleHeader.innerText = 'Синглы';
                contentArea.appendChild(singleHeader);

                singles.forEach(single => {
                    const div = document.createElement('div');
                    div.className = `track-item ${currentIdx === single.index ? 'active' : ''}`;
                    div.innerHTML = `<img src="${single.cover}"> <div><strong>${single.title}</strong><br><small>Single</small></div>`;
                    div.onclick = () => loadTrack(single.index);
                    contentArea.appendChild(div);
                });
            }
        }

        function renderAlbumTracks(album) {
            currentOpenAlbum = album;
            contentArea.innerHTML = '';

            const backBtn = document.createElement('div');
            backBtn.style = "cursor:pointer; color:var(--accent); margin-bottom:15px; font-weight:bold;";
            backBtn.innerText = "← Назад к альбомам";
            backBtn.onclick = () => showView('albums');
            contentArea.appendChild(backBtn);

            const header = document.createElement('div');
            header.style = "display:flex; align-items:center; gap:15px; margin-bottom:20px;";
            header.innerHTML = `<img src="${album.cover}" style="width:60px; height:60px; border-radius:10px;"> <h3>${album.name}</h3>`;
            contentArea.appendChild(header);
            
            album.tracks.forEach(track => {
                const li = document.createElement('div');
                li.className = `track-item ${currentIdx === track.index ? 'active' : ''}`;
                li.innerHTML = `<div><strong>${track.title}</strong></div>`;
                li.onclick = () => loadTrack(track.index);
                contentArea.appendChild(li);
            });
        }

        function showView(view) {
            currentView = view;
            document.getElementById('btn-tracks').classList.toggle('active', view === 'tracks');
            document.getElementById('btn-albums').classList.toggle('active', view === 'albums');
            view === 'tracks' ? renderAllTracks() : renderAlbums();
        }

        function loadTrack(index) {
            currentIdx = index;
            const track = musicConfig[index];
            document.getElementById('title').innerText = track.title;
            document.getElementById('cover').src = track.cover;
            audio.src = track.file;
            
            if (currentView === 'tracks') {
                renderAllTracks();
            } else if (currentOpenAlbum) {
                renderAlbumTracks(currentOpenAlbum);
            } else {
                renderAlbums();
            }
            togglePlay(true);
        }

        function togglePlay(forcePlay = false) {
            if (audio.paused || forcePlay) { 
                audio.play(); 
                playBtn.innerHTML = '⏸&#xFE0E;'; // Иконка паузы
            }
            else { 
                audio.pause(); 
                playBtn.innerHTML = '▶&#xFE0E;'; // Иконка плея
            }
        }

        function nextTrack() { currentIdx = (currentIdx + 1) % musicConfig.length; loadTrack(currentIdx); }
        function prevTrack() { currentIdx = (currentIdx - 1 + musicConfig.length) % musicConfig.length; loadTrack(currentIdx); }
        
        function toggleRepeat() {
            isRepeat = !isRepeat;
            document.getElementById('repeatBtn').style.opacity = isRepeat ? '1' : '0.4';
        }

        audio.ontimeupdate = () => {
            const progress = document.getElementById('progress');
            progress.max = audio.duration || 0;
            progress.value = audio.currentTime;
            document.getElementById('current').innerText = formatTime(audio.currentTime);
            document.getElementById('duration').innerText = formatTime(audio.duration);
        };
        document.getElementById('progress').oninput = function() { audio.currentTime = this.value; };
        audio.onended = () => isRepeat ? audio.play() : nextTrack();

        function formatTime(sec) {
            if (isNaN(sec)) return "0:00";
            let min = Math.floor(sec / 60), s = Math.floor(sec % 60);
            return `${min}:${s < 10 ? '0' + s : s}`;
        }

        showView('tracks');
        loadTrack(0);
        togglePlay(false);
    </script>
</body>
</html>
